<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E53935" />
      <stop offset="100%" stop-color="#7f1d1d" />
    </linearGradient>
    
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#8a7322" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <polygon points="50,10 85,30 85,70 50,90 15,70 15,30" fill="#171717" stroke="#0A0A0A" stroke-width="2"/>

  <polygon points="15,30 50,50 50,90 15,70" fill="url(#redGrad)" opacity="0.95"/>

  <polygon points="85,30 50,50 50,90 85,70" fill="#0A0A0A" stroke="#E53935" stroke-width="1.5"/>

  <polygon points="50,10 85,30 50,50 15,30" fill="none" stroke="#D4AF37" stroke-width="2.5" filter="url(#glow)"/>

  <line x1="50" y1="50" x2="50" y2="10" stroke="#D4AF37" stroke-width="2" stroke-dasharray="3" opacity="0.8"/>
  <line x1="50" y1="50" x2="15" y2="70" stroke="#0A0A0A" stroke-width="2" />
  <line x1="50" y1="50" x2="85" y2="70" stroke="#E53935" stroke-width="2" />

  <circle cx="50" cy="50" r="5" fill="#D4AF37" filter="url(#glow)"/>
  <circle cx="50" cy="50" r="2.5" fill="#0A0A0A"/>
</svg>
